<script>
const SHEET_ID = '1h3ZnjMmwfC_jlLAto90GMuPkl4yQ5lfaQ7U4P1JtSfU';
const SHEET_NAME = 'Tab';
const SHEET_GID = '0';
const CSV_URLS = [
  'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(SHEET_NAME),
  'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&sheet=' + encodeURIComponent(SHEET_NAME),

];

const STORAGE_KEY = 'padelScheduleCacheV1';
const STORAGE_TS_KEY = 'padelScheduleCacheTimestampV1';

const fallbackRows = [
  { day: 'Sat', date: '18/04/2026', start: '06:30', end: '08:30', duration: '120', location: 'Wadala', court: '3 Men Americano', players: 'Yogesh, Sahil, Gautam Dubai' },
  { day: 'Sun', date: '19/04/2026', start: '20:00', end: '21:30', duration: '90', location: 'Wadala', court: '3', players: 'AD, NMD, Sheldon, Rohit Ramaswamy' },
  { day: 'Wed', date: '22/04/2026', start: '19:00', end: '20:30', duration: '90', location: 'Wadala', court: '3', players: 'AD, Aman Makan, Dinesh, Advait' },
  { day: 'Thu', date: '23/04/2026', start: '19:00', end: '20:30', duration: '90', location: 'Wadala', court: '3', players: 'AD, NMD, Sonia' },
  { day: 'Fri', date: '24/04/2026', start: '18:00', end: '20:00', duration: '120', location: 'Wadala', court: '4', players: 'Women Americano' },
  { day: 'Sat', date: '25/04/2026', start: '06:30', end: '08:00', duration: '90', location: 'Wadala', court: '3', players: 'AD' },
  { day: 'Sun', date: '26/04/2026', start: '18:00', end: '19:30', duration: '90', location: 'Wadala', court: '3', players: '' }
];

const contentEl = document.getElementById('content');
const noticeEl = document.getElementById('notice');
const nextGameBannerEl = document.getElementById('nextGameBanner');
const nextGameCountdownEl = document.getElementById('nextGameCountdown');
const flipCardEls = {
  days: nextGameCountdownEl.querySelector('[data-unit="days"]'),
  hours: nextGameCountdownEl.querySelector('[data-unit="hours"]'),
  minutes: nextGameCountdownEl.querySelector('[data-unit="minutes"]'),
  seconds: nextGameCountdownEl.querySelector('[data-unit="seconds"]')
};
const previousCountdownValues = { days: '', hours: '', minutes: '', seconds: '' };

let data = [];
let calendarMonth = null;
let selectedBookingDate = '';
let selectedPlayer = '';
let renderDebounceTimer = null;
let countdownInterval = null;
let lastRenderedRows = [];
let playerHueMap = {};

function saveCache(rows) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(rows));
    localStorage.setItem(STORAGE_TS_KEY, String(Date.now()));
  } catch (error) {}
}

function loadCache() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      return [];
    }
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    return [];
  }
}

function getCacheTimestampLabel() {
  try {
    const raw = localStorage.getItem(STORAGE_TS_KEY);
    const ts = Number(raw);
    return ts ? new Date(ts).toLocaleString() : '';
  } catch (error) {
    return '';
  }
}

function validateHeaders(rows) {
  if (!rows.length) {
    throw new Error('The sheet is empty.');
  }
  const headers = headerIndexMap(rows[0]);
  if (headers.date === undefined) {
    throw new Error('Missing required column: date');
  }
}

function scheduleRender() {
  clearTimeout(renderDebounceTimer);
  renderDebounceTimer = setTimeout(render, 200);
}

function getUpcomingRows(rows) {
  const now = new Date();
  return rows
    .map(function(item) {
      return { item: item, dateValue: parseDateValue(item.date, item.start) };
    })
    .filter(function(entry) {
      return entry.dateValue && entry.dateValue.getTime() >= now.getTime();
    })
    .sort(function(a, b) {
      return a.dateValue.getTime() - b.dateValue.getTime();
    });
}

function getNextBookingKey(rows) {
  const upcoming = getUpcomingRows(rows);
  return upcoming.length ? bookingKeyFromDateString(upcoming[0].item.date) : '';
}

function getCountdownParts(ms) {
  const totalSeconds = Math.max(0, Math.floor(ms / 1000));
  const days = Math.floor(totalSeconds / 86400);
  const hours = Math.floor((totalSeconds % 86400) / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  return {
    days: String(days).padStart(2, '0'),
    hours: String(hours).padStart(2, '0'),
    minutes: String(minutes).padStart(2, '0'),
    seconds: String(seconds).padStart(2, '0')
  };
}

function setFlipValue(unit, value) {
  const card = flipCardEls[unit];
  if (!card) {
    return;
  }
  const middle = card.querySelector('.flip-value');
  if (previousCountdownValues[unit] === value) {
    middle.textContent = value;
    return;
  }
  middle.textContent = value;
  card.classList.remove('flipping');
  void card.offsetWidth;
  card.classList.add('flipping');
  previousCountdownValues[unit] = value;
}

function setFlipLiveState() {
  ['days', 'hours', 'minutes', 'seconds'].forEach(function(unit) {
    setFlipValue(unit, unit === 'seconds' ? 'GO' : '00');
  });
}

function updateNextGameBanner(rows) {
  clearInterval(countdownInterval);
  const upcoming = getUpcomingRows(rows);
  if (!upcoming.length) {
    nextGameBannerEl.style.display = 'none';
    return;
  }

  const eventDate = upcoming[0].dateValue;

  function paintCountdown() {
    const diff = eventDate.getTime() - Date.now();
    if (diff <= 0) {
      setFlipLiveState();
      return;
    }
    const parts = getCountdownParts(diff);
    setFlipValue('days', parts.days);
    setFlipValue('hours', parts.hours);
    setFlipValue('minutes', parts.minutes);
    setFlipValue('seconds', parts.seconds);
  }

  nextGameBannerEl.style.display = 'block';
  paintCountdown();
  countdownInterval = setInterval(paintCountdown, 1000);
}

function showNotice(message) {
  noticeEl.textContent = message;
  noticeEl.style.display = 'block';
}

function hideNotice() {
  noticeEl.textContent = '';
  noticeEl.style.display = 'none';
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    const next = text[i + 1];
    if (char === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i += 1;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      row.push(cell);
      cell = '';
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && next === '\n') {
        i += 1;
      }
      row.push(cell);
      rows.push(row);
      row = [];
      cell = '';
    } else {
      cell += char;
    }
  }

  if (cell.length > 0 || row.length > 0) {
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function normaliseTime(value) {
  if (value === null || value === undefined || value === '') {
    return '';
  }
  const str = String(value).trim();
  if (/^\d{1,2}:\d{2}$/.test(str)) {
    const parts = str.split(':');
    return parts[0].padStart(2, '0') + ':' + parts[1];
  }
  if (/^\d{1,2}$/.test(str)) {
    return str.padStart(2, '0') + ':00';
  }
  return str;
}

function formatToAMPM(timeStr) {
  if (!timeStr) {
    return '';
  }
  const parts = String(timeStr).trim().split(':');
  if (parts.length < 2) {
    return timeStr;
  }
  const hours = Number(parts[0]);
  const minutes = Number(parts[1]);
  if (Number.isNaN(hours) || Number.isNaN(minutes)) {
    return timeStr;
  }
  const period = hours >= 12 ? 'PM' : 'AM';
  const hours12 = hours % 12 === 0 ? 12 : hours % 12;
  return String(hours12) + ':' + String(minutes).padStart(2, '0') + ' ' + period;
}

function isValidSheetDate(value) {
  return /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(String(value || '').trim());
}

function formatShortDate(value) {
  if (!isValidSheetDate(value)) {
    return value || '';
  }
  const parts = String(value).trim().split('/');
  const day = parts[0].padStart(2, '0');
  const monthIndex = parseInt(parts[1], 10) - 1;
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const month = months[monthIndex] || parts[1];
  return day + ' ' + month;
}

function parseDateValue(dateStr, timeStr) {
  if (!isValidSheetDate(dateStr)) {
    return null;
  }
  const match = String(dateStr).trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!match) {
    return null;
  }
  const dd = match[1];
  const mm = match[2];
  const yyyy = match[3];
  const time = normaliseTime(timeStr || '00:00') || '00:00';
  const iso = yyyy + '-' + mm.padStart(2, '0') + '-' + dd.padStart(2, '0') + 'T' + time + ':00';
  const date = new Date(iso);
  return Number.isNaN(date.getTime()) ? null : date;
}

function parseDayMonthYear(value) {
  const match = String(value || '').trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!match) {
    return null;
  }
  return {
    day: parseInt(match[1], 10),
    month: parseInt(match[2], 10) - 1,
    year: parseInt(match[3], 10)
  };
}

function bookingKeyFromParts(year, month, day) {
  return String(year) + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
}

function bookingKeyFromDateString(value) {
  const parts = parseDayMonthYear(value);
  return parts ? bookingKeyFromParts(parts.year, parts.month, parts.day) : '';
}

function headerIndexMap(headers) {
  const map = {};
  headers.forEach(function(header, index) {
    map[String(header || '').trim().toLowerCase()] = index;
  });
  return map;
}

function normalizeHeaderValue(value) {
  return String(value || '').replace(/[^a-z0-9]/gi, '').toLowerCase();
}

function getCell(row, map, keys) {
  for (let i = 0; i < keys.length; i += 1) {
    const idx = map[keys[i]];
    if (idx !== undefined) {
      return row[idx] || '';
    }
  }

  const mapKeys = Object.keys(map);
  for (let i = 0; i < keys.length; i += 1) {
    const normalizedKey = normalizeHeaderValue(keys[i]);
    const found = mapKeys.find(function(k) {
      const normalizedHeader = normalizeHeaderValue(k);
      return normalizedHeader.includes(normalizedKey) || normalizedKey.includes(normalizedHeader);
    });
    if (found) {
      return row[map[found]] || '';
    }
  }

  return '';
}

function sanitizePlayers(value) {
  return String(value || '').trim();
}

function compactPlayers(values) {
  return values
    .map(function(value) { return String(value || '').trim(); })
    .filter(Boolean)
    .join(', ');
}

function countPlayers(playersValue) {
  const raw = String(playersValue || '').trim();
  if (!raw) {
    return 0;
  }
  return raw
    .split(/[,+]/)
    .map(function(part) { return String(part || '').trim(); })
    .filter(Boolean)
    .length;
}

function hasLessThanFourPlayers(item) {
  return countPlayers(item.players) < 4;
}

function rowsFromCsv(text) {
  const rows = parseCSV(text);
  if (!rows.length) {
    return [];
  }

  validateHeaders(rows);
  const headers = headerIndexMap(rows[0]);
  return rows.slice(1)
    .filter(function(row) {
      return row.some(function(cell) { return String(cell || '').trim(); });
    })
    .map(function(row) {
      const player1 = getCell(row, headers, ['player 1', 'player1']);
      const player2 = getCell(row, headers, ['player 2', 'player2']);
      const player3 = getCell(row, headers, ['player 3', 'player3']);
      const player4 = getCell(row, headers, ['player 4', 'player4']);
      const combinedPlayers = getCell(row, headers, ['players', 'player names']);
      const players = compactPlayers([player1, player2, player3, player4]) || sanitizePlayers(combinedPlayers);

      return {
        day: getCell(row, headers, ['day']),
        date: getCell(row, headers, ['date']),
        start: normaliseTime(getCell(row, headers, ['start time', 'start'])),
        end: normaliseTime(getCell(row, headers, ['end time', 'end'])),
        duration: getCell(row, headers, ['duration (min)', 'duration']),
        location: getCell(row, headers, ['location']),
        court: getCell(row, headers, ['court']),
        players: players
      };
    })
    .filter(function(row) {
      return isValidSheetDate(row.date);
    });
}

async function fetchCsv(url) {
  const response = await fetch(url, { method: 'GET', cache: 'no-store', mode: 'cors' });
  if (!response.ok) {
    throw new Error('Request failed with status ' + response.status);
  }
  return await response.text();
}

async function fetchFirstWorkingCsv(urls) {
  const errors = [];
  for (let i = 0; i < urls.length; i += 1) {
    try {
      return await fetchCsv(urls[i]);
    } catch (error) {
      errors.push(error.message);
    }
  }
  if (window.location.protocol === 'file:') {
    throw new Error('This page is opened as a local file. Open it from GitHub Pages, Vercel, Netlify, or a local web server.');
  }
  throw new Error(errors.join(' | '));
}

function setLoading(message) {
  const div = document.createElement('div');
  div.className = 'loading';
  div.textContent = message;
  contentEl.replaceChildren(div);
}

function splitPlayers(playersValue) {
  return String(playersValue || '')
    .split(/[,+&/]/)
    .map(function(player) { return String(player || '').trim(); })
    .filter(Boolean);
}

function normalizePlayerName(value) {
  return String(value || '').trim().toLowerCase();
}

function playerMatchesItem(item, playerName) {
  if (!playerName) {
    return true;
  }
  const selected = normalizePlayerName(playerName);
  return splitPlayers(item.players).some(function(player) {
    return normalizePlayerName(player) === selected;
  });
}

function getUniquePlayers(rows) {
  const seen = {};
  rows.forEach(function(item) {
    splitPlayers(item.players).forEach(function(player) {
      const key = normalizePlayerName(player);
      if (key && !seen[key]) {
        seen[key] = player;
      }
    });
  });

  return Object.keys(seen)
    .sort(function(a, b) { return seen[a].localeCompare(seen[b]); })
    .map(function(key) { return seen[key]; });
}

function selectPlayer(playerName) {
  selectedPlayer = selectedPlayer === playerName ? '' : playerName;
  selectedBookingDate = '';
  calendarMonth = null;
  render();
}

function buildPlayerChips(rows) {
  const players = getUniquePlayers(rows);
  const wrapper = document.createElement('div');
  wrapper.className = 'player-chip-bar';

  if (selectedPlayer) {
    const clearBtn = document.createElement('button');
    clearBtn.type = 'button';
    clearBtn.className = 'clear-player-chip';
    clearBtn.textContent = 'Show all';
    clearBtn.addEventListener('click', function() {
      selectPlayer('');
    });
    wrapper.appendChild(clearBtn);
  }

  players.forEach(function(player) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'player-chip';
    if (player === selectedPlayer) {
      btn.classList.add('is-active');
    }
    btn.textContent = player;
    applyPlayerChipColor(btn, player);
    btn.title = 'Show games for ' + player;
    btn.addEventListener('click', function() {
      selectPlayer(player);
    });
    wrapper.appendChild(btn);
  });

  return wrapper;
}

function assignUniquePlayerColors(rows) {
  const players = getUniquePlayers(rows);
  playerHueMap = {};
  players.forEach(function(player, index) {
    playerHueMap[normalizePlayerName(player)] = (index * 360) / players.length;
  });
}

function getPlayerHue(playerName) {
  const key = normalizePlayerName(playerName);
  if (playerHueMap[key] === undefined) {
    assignUniquePlayerColors(data);
  }
  return playerHueMap[key] !== undefined ? playerHueMap[key] : 138;
}

function applyPlayerChipColor(element, playerName) {
  element.style.setProperty('--chip-hue', String(getPlayerHue(playerName)));
}

function getBookingRelativeLabel(dateStr) {
  const parts = parseDayMonthYear(dateStr);
  if (!parts) {
    return '';
  }

  const bookingDate = new Date(parts.year, parts.month, parts.day);
  const today = new Date();
  const todayOnly = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const tomorrowOnly = new Date(todayOnly);
  tomorrowOnly.setDate(todayOnly.getDate() + 1);

  if (bookingDate.getTime() === todayOnly.getTime()) {
    return 'today';
  }
  if (bookingDate.getTime() === tomorrowOnly.getTime()) {
    return 'tomorrow';
  }
  return '';
}

function buildShareText(item) {
  const dateLabel = [item.day, formatShortDate(item.date)].filter(Boolean).join(' ');
  const timeLabel = [formatToAMPM(item.start), formatToAMPM(item.end)].filter(Boolean).join(' - ');
  const locationLabel = [item.location, item.court ? 'Court ' + item.court : ''].filter(Boolean).join(' - ');
  const playersArray = splitPlayers(item.players);
  const playerCount = playersArray.length;
  const maxPlayers = 4;
  const spotsLeft = Math.max(0, maxPlayers - playerCount);
  const playersBlock = playersArray.length
    ? playersArray.map(function(player) { return '- ' + player; }).join('\n')
    : '- Open slots';
  const relativeLabel = getBookingRelativeLabel(item.date);
  const baseTitle = playerCount < maxPlayers ? 'Setting up a game' : 'See you on court';
  const title = relativeLabel ? baseTitle + ' ' + relativeLabel + '!' : baseTitle + '!';
  const message = [
    title,
    '',
    'Date: ' + dateLabel,
    'Time: ' + timeLabel,
    'Place: ' + locationLabel,
    '',
    'Players (' + playerCount + '/' + maxPlayers + '):',
    playersBlock
  ];

  if (spotsLeft > 0) {
    message.push('', spotsLeft + ' spot' + (spotsLeft === 1 ? '' : 's') + ' left!');
  }

  return message.join('\n');
}

function shareOnWhatsApp(item) {
  const text = buildShareText(item);
  const url = 'https://wa.me/?text=' + encodeURIComponent(text);
  window.open(url, '_blank', 'noopener,noreferrer');
}

function wrapSection(title, subtitle, child, className) {
  const section = document.createElement('section');
  section.className = 'section-card ' + (className || '');

  if (title || subtitle) {
    const label = document.createElement('div');
    label.className = 'section-label';
    const titleEl = document.createElement('div');
    titleEl.className = 'section-title';
    titleEl.textContent = title;
    label.appendChild(titleEl);

    if (subtitle) {
      const subtitleEl = document.createElement('div');
      subtitleEl.className = 'section-subtitle';
      subtitleEl.textContent = subtitle;
      label.appendChild(subtitleEl);
    }

    section.appendChild(label);
  }

  section.appendChild(child);
  return section;
}

function buildTable(rows) {
  const wrapper = document.createElement('div');
  wrapper.className = 'table-wrap';
  wrapper.id = 'schedule-table';
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const tbody = document.createElement('tbody');
  const headerRow = document.createElement('tr');
  const headers = ['', 'Date', 'Time', 'Location', 'Players', 'Share'];

  headers.forEach(function(label) {
    const th = document.createElement('th');
    if (label === '') {
      th.className = 'availability-col';
    }
    if (label === 'Share') {
      th.className = 'share-col';
    }
    th.textContent = label;
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);

  rows.forEach(function(item) {
    const tr = document.createElement('tr');
    const bookingKey = bookingKeyFromDateString(item.date);
    tr.dataset.bookingDate = bookingKey;
    if (selectedBookingDate && bookingKey === selectedBookingDate) {
      tr.classList.add('is-selected');
    }

    const availabilityTd = document.createElement('td');
    availabilityTd.className = 'availability-cell';
    if (hasLessThanFourPlayers(item)) {
      const icon = document.createElement('span');
      icon.className = 'availability-icon';
      icon.textContent = '!';
      icon.title = 'Less than 4 players';
      availabilityTd.appendChild(icon);
    }
    tr.appendChild(availabilityTd);

    const dateTd = document.createElement('td');
    dateTd.textContent = [item.day, formatShortDate(item.date)].filter(Boolean).join(' ');
    tr.appendChild(dateTd);

    const timeTd = document.createElement('td');
    const formattedStart = formatToAMPM(item.start || '');
    const formattedEnd = formatToAMPM(item.end || '');
    timeTd.textContent = formattedStart && formattedEnd ? formattedStart + ' - ' + formattedEnd : (formattedStart || formattedEnd);
    tr.appendChild(timeTd);

    const locationCourtTd = document.createElement('td');
    locationCourtTd.textContent = (item.location || '') + (item.court ? ' # ' + item.court : '');
    tr.appendChild(locationCourtTd);

    const playersTd = document.createElement('td');
    const playersWrap = document.createElement('div');
    playersWrap.className = 'players-cell';
    const rowPlayers = splitPlayers(item.players);

    if (rowPlayers.length) {
      rowPlayers.forEach(function(player) {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'table-player-chip';
        if (player === selectedPlayer) {
          chip.classList.add('is-active');
        }
        chip.textContent = player;
        applyPlayerChipColor(chip, player);
        chip.title = 'Show games for ' + player;
        chip.addEventListener('click', function() {
          selectPlayer(player);
        });
        playersWrap.appendChild(chip);
      });
    } else {
      playersWrap.textContent = '--';
    }

    playersTd.appendChild(playersWrap);
    tr.appendChild(playersTd);

    const shareTd = document.createElement('td');
    shareTd.className = 'share-cell';
    const shareBtn = document.createElement('button');
    shareBtn.type = 'button';
    shareBtn.className = 'whatsapp-share-btn';
    shareBtn.title = 'Share on WhatsApp';
    shareBtn.setAttribute('aria-label', 'Share on WhatsApp');
    shareBtn.innerHTML = '<svg viewBox="0 0 32 32" aria-hidden="true" focusable="false"><path fill="white" d="M16.001 3.2c-7.055 0-12.801 5.746-12.801 12.8 0 2.258.593 4.461 1.723 6.404L3.2 28.8l6.587-1.701a12.73 12.73 0 0 0 6.214 1.602c7.055 0 12.799-5.746 12.799-12.801 0-7.054-5.744-12.7-12.799-12.7zm0 23.201c-1.928 0-3.814-.52-5.46-1.503l-.39-.232-3.907 1.009 1.041-3.808-.255-.393a10.36 10.36 0 0 1-1.588-5.474c0-5.743 4.674-10.417 10.559-10.417 5.823 0 10.559 4.674 10.559 10.417 0 5.743-4.736 10.401-10.559 10.401zm5.79-7.84c-.316-.158-1.872-.925-2.163-1.03-.29-.106-.5-.158-.711.158-.211.316-.816 1.03-1.001 1.242-.185.211-.369.237-.685.079-.316-.158-1.334-.491-2.54-1.566-.938-.835-1.571-1.867-1.755-2.183-.185-.316-.02-.487.138-.645.143-.143.316-.369.474-.553.158-.185.211-.316.316-.527.106-.211.053-.395-.026-.553-.079-.158-.711-1.716-.974-2.353-.256-.616-.516-.533-.711-.543l-.606-.011c-.211 0-.553.079-.842.395-.29.316-1.106 1.079-1.106 2.632 0 1.553 1.132 3.053 1.29 3.263.158.211 2.228 3.402 5.401 4.77.755.326 1.344.52 1.804.665.758.241 1.448.207 1.993.126.608-.09 1.872-.765 2.136-1.504.264-.738.264-1.371.185-1.504-.079-.132-.29-.211-.606-.369z"/></svg>';
    shareBtn.addEventListener('click', function() {
      shareOnWhatsApp(item);
    });
    shareTd.appendChild(shareBtn);
    tr.appendChild(shareTd);

    tbody.appendChild(tr);
  });

  table.appendChild(thead);
  table.appendChild(tbody);
  wrapper.appendChild(table);
  return wrapper;
}

function getBookedDateCounts(rows) {
  const counts = {};
  rows.forEach(function(item) {
    const key = bookingKeyFromDateString(item.date);
    if (key) {
      counts[key] = (counts[key] || 0) + 1;
    }
  });
  return counts;
}

function getCalendarAnchorMonth(rows) {
  if (!rows.length) {
    const now = new Date();
    return { year: now.getFullYear(), month: now.getMonth() };
  }
  const sorted = rows
    .map(function(item) { return parseDateValue(item.date, item.start); })
    .filter(Boolean)
    .sort(function(a, b) { return a.getTime() - b.getTime(); });
  const anchor = sorted[0] || new Date();
  return { year: anchor.getFullYear(), month: anchor.getMonth() };
}

function monthLabel(year, month) {
  return new Date(year, month, 1).toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
}

function buildCalendar(rows) {
  const bookedCounts = getBookedDateCounts(rows);
  const anchor = calendarMonth || getCalendarAnchorMonth(rows);
  const year = anchor.year;
  const month = anchor.month;
  const today = new Date();
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstWeekday = firstDay.getDay();
  const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  const wrapper = document.createElement('div');
  wrapper.className = 'calendar-wrap';

  const header = document.createElement('div');
  header.className = 'calendar-header';

  const prevBtn = document.createElement('button');
  prevBtn.type = 'button';
  prevBtn.className = 'calendar-nav';
  prevBtn.textContent = '<';
  prevBtn.addEventListener('click', function() {
    calendarMonth = { year: month === 0 ? year - 1 : year, month: month === 0 ? 11 : month - 1 };
    render();
  });

  const title = document.createElement('div');
  title.className = 'calendar-title';
  title.textContent = monthLabel(year, month);

  const nextBtn = document.createElement('button');
  nextBtn.type = 'button';
  nextBtn.className = 'calendar-nav';
  nextBtn.textContent = '>';
  nextBtn.addEventListener('click', function() {
    calendarMonth = { year: month === 11 ? year + 1 : year, month: month === 11 ? 0 : month + 1 };
    render();
  });

  header.appendChild(prevBtn);
  header.appendChild(title);
  header.appendChild(nextBtn);
  wrapper.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'calendar-grid';

  weekdays.forEach(function(day) {
    const weekday = document.createElement('div');
    weekday.className = 'calendar-weekday';
    weekday.textContent = day;
    grid.appendChild(weekday);
  });

  for (let i = 0; i < firstWeekday; i += 1) {
    const empty = document.createElement('div');
    empty.className = 'calendar-day is-empty';
    grid.appendChild(empty);
  }

  for (let day = 1; day <= daysInMonth; day += 1) {
    const cell = document.createElement('div');
    cell.className = 'calendar-day';
    const key = bookingKeyFromParts(year, month, day);
    const bookings = bookedCounts[key] || 0;
    const cellDate = new Date(year, month, day);
    const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
    const isPast = cellDate < new Date(today.getFullYear(), today.getMonth(), today.getDate());

    if (bookings > 0) {
      cell.classList.add('is-booked');
      cell.setAttribute('role', 'button');
      cell.setAttribute('tabindex', '0');
      cell.setAttribute('aria-label', 'Show games on ' + day + ' ' + monthLabel(year, month));
      if (key === getNextBookingKey(rows)) {
        cell.classList.add('is-next-booking');
      }
      cell.addEventListener('click', function() {
        selectedBookingDate = selectedBookingDate === key ? '' : key;
        render();
        requestAnimationFrame(function() {
          const tableWrap = document.getElementById('schedule-table');
          if (tableWrap) {
            tableWrap.scrollIntoView({ behavior: 'smooth', block: 'start', inline: 'nearest' });
          }
        });
      });
      cell.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          cell.click();
        }
      });
    }

    if (selectedBookingDate && key === selectedBookingDate) {
      cell.classList.add('is-selected');
    }
    if (isToday) {
      cell.classList.add('is-today');
    }
    if (isPast) {
      cell.classList.add('is-past');
    }

    const number = document.createElement('div');
    number.className = 'calendar-day-num';
    number.textContent = String(day);
    number.setAttribute('data-day', String(day));

    const dayText = document.createElement('span');
    dayText.className = 'day-text';
    dayText.textContent = String(day);

    const ballText = document.createElement('span');
    ballText.className = 'ball-text';
    ballText.innerHTML = '<svg class="tennis-ball-svg" viewBox="0 0 64 64" aria-hidden="true" focusable="false"><circle cx="32" cy="32" r="24" fill="#b8ff4d"></circle><path d="M 20 10 C 35 18, 35 46, 20 54" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"></path><path d="M 44 10 C 29 18, 29 46, 44 54" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"></path></svg>';

    number.appendChild(dayText);
    number.appendChild(ballText);
    cell.appendChild(number);
    grid.appendChild(cell);
  }

  wrapper.appendChild(grid);
  return wrapper;
}

function render() {
  const filtered = data
    .filter(function(item) {
      return playerMatchesItem(item, selectedPlayer);
    })
    .sort(function(a, b) {
      const ta = (parseDateValue(a.date, a.start) || new Date(0)).getTime();
      const tb = (parseDateValue(b.date, b.start) || new Date(0)).getTime();
      return ta - tb;
    });

  if (!filtered.length) {
    lastRenderedRows = [];
    updateNextGameBanner([]);
    const emptyDiv = document.createElement('div');
    emptyDiv.className = 'empty';
    emptyDiv.textContent = selectedPlayer ? 'No games found for ' + selectedPlayer + '.' : 'No games found.';
    contentEl.replaceChildren(buildPlayerChips(data), emptyDiv);
    return;
  }

  lastRenderedRows = filtered;
  updateNextGameBanner(filtered);

  if (!calendarMonth) {
    calendarMonth = getCalendarAnchorMonth(filtered);
  }

  contentEl.replaceChildren(
    buildPlayerChips(data),
    wrapSection('', '', buildCalendar(filtered), 'section-calendar'),
    wrapSection('', '', buildTable(filtered), 'section-table')
  );
}

async function loadData() {
  setLoading('Loading schedule...');
  hideNotice();
  try {
    const csvText = await fetchFirstWorkingCsv(CSV_URLS);
    const liveRows = rowsFromCsv(csvText);
    if (!liveRows.length) {
      throw new Error('The sheet loaded but no valid dated rows were parsed.');
    }
    data = liveRows;
    saveCache(liveRows);
    if (!calendarMonth) {
      calendarMonth = getCalendarAnchorMonth(liveRows);
    }
  } catch (error) {
    const cachedRows = loadCache();
    if (cachedRows.length) {
      data = cachedRows;
      if (!calendarMonth) {
        calendarMonth = getCalendarAnchorMonth(cachedRows);
      }
      const tsLabel = getCacheTimestampLabel();
      showNotice('Live Google Sheet data could not be loaded, so cached data is being shown instead' + (tsLabel ? ' (last updated ' + tsLabel + ')' : '') + '. ' + error.message);
    } else {
      data = fallbackRows;
      if (!calendarMonth) {
        calendarMonth = getCalendarAnchorMonth(fallbackRows);
      }
      showNotice('Live Google Sheet data could not be loaded, so backup data is being shown instead. ' + error.message);
    }
  }
  render();
}

loadData();
</script>
